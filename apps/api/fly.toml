app = "cyt-finance-api"
primary_region = "gru"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Cron: dispara POST /recurring/tick diariamente às 06:00 UTC (03:00 BRT)
[[services]]
  [[services.processes]]
    name = "recurring-cron"
    cmd = ["sh", "-c", "while true; do sleep 86400 && curl -sS -X POST -H \"X-Cron-Secret: $CRON_SECRET\" https://cyt-finance-api.fly.dev/recurring/tick; done"]

[env]
  PORT = "8000"
